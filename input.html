<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>銀座楼蘭 月次レポート 手入力</title>
<style>
  :root{--navy:#1c3a5e;--gold:#c9a84a;--ink:#222;--bg:#f4f6f8;--card:#fff;--line:#e5e9ee;}
  *{box-sizing:border-box;}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;margin:0;background:var(--bg);color:var(--ink);}
  header{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20;}
  header h1{font-size:16px;margin:0;font-weight:700;}
  header .month{margin-left:auto;}
  header input[type=month]{font-size:14px;padding:5px 8px;border-radius:6px;border:none;}
  .wrap{max-width:720px;margin:0 auto;padding:16px 14px 110px;}
  .card{background:var(--card);border-radius:10px;padding:16px;margin:14px 0;box-shadow:0 1px 4px rgba(0,0,0,.07);}
  .card h2{font-size:15px;margin:0 0 12px;padding-left:10px;border-left:5px solid var(--navy);}
  .card h2 .tag{font-size:11px;color:#fff;background:var(--gold);border-radius:4px;padding:2px 7px;margin-left:8px;font-weight:600;vertical-align:middle;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  label{display:block;font-size:12px;color:#566;margin-bottom:3px;}
  input[type=number],input[type=text]{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:7px;font-size:15px;}
  input[type=number]{text-align:right;}
  input:focus{outline:none;border-color:var(--navy);}
  .hint{font-size:11px;color:#8a96a3;margin:8px 0 0;}
  details{margin-top:6px;}
  summary{cursor:pointer;font-size:13px;color:#778;}
  .actions{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:12px 14px;display:flex;gap:10px;justify-content:center;z-index:30;}
  button{font-size:15px;font-weight:700;padding:13px 28px;border-radius:8px;border:none;cursor:pointer;}
  .btn{background:var(--navy);color:#fff;}
  .btn-ghost{background:#eef1f4;color:#445;}
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;opacity:0;transition:.3s;z-index:40;max-width:90%;text-align:center;}
  .toast.show{opacity:.96;}
  .status{font-size:12px;color:#8a96a3;text-align:center;margin:6px 0 0;}
  a.back{color:#cad7e6;text-decoration:none;font-size:13px;}
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">← レポート</a>
  <h1>月次レポート 手入力</h1>
  <span class="month">対象月 <input type="month" id="month"></span>
</header>

<div class="wrap">
  <div class="card">
    <h2>その他売上<span class="tag">手入力</span></h2>
    <div class="grid">
      <div><label>その他売上(円)</label><input type="number" id="その他売上" placeholder="0"></div>
      <div style="grid-column:1/-1"><label>内容メモ</label><input type="text" id="その他売上_内容" placeholder="テイクアウト・物販・イベント等"></div>
    </div>
    <div class="hint">招待日和・ダイナース・掛売上・旅助は自動集計のため入力不要。ここはテイクアウト等のみ。</div>
  </div>

  <div class="card">
    <h2>口コミスコア<span class="tag">手入力</span></h2>
    <div class="grid">
      <div><label>食べログ スコア</label><input type="number" step="0.01" id="食べログ_スコア" placeholder="0"></div>
      <div><label>食べログ 件数</label><input type="number" id="食べログ_件数" placeholder="0"></div>
      <div><label>一休 スコア</label><input type="number" step="0.01" id="一休_スコア" placeholder="0"></div>
      <div><label>一休 件数</label><input type="number" id="一休_件数" placeholder="0"></div>
      <div><label>Google スコア</label><input type="number" step="0.01" id="Google_スコア" placeholder="0"></div>
      <div><label>Google 件数</label><input type="number" id="Google_件数" placeholder="0"></div>
    </div>
  </div>

  <div class="card">
    <h2>SNS<span class="tag">手入力</span></h2>
    <div class="grid">
      <div><label>Instagram フォロワー数</label><input type="number" id="SNS_フォロワー数" placeholder="0"></div>
    </div>
    <div class="hint">「フォロワー」画面の総数。閲覧・いいね等はスクショから自動取得。</div>
  </div>

  <div class="card">
    <h2>PL（収益）<span class="tag">通常は自動</span></h2>
    <details>
      <summary>収支一覧が無い月だけ手入力（開く）</summary>
      <div class="grid" style="margin-top:10px">
        <div><label>原価率(%)</label><input type="number" step="0.1" id="原価率" placeholder="0"></div>
        <div><label>人件費額(円)</label><input type="number" id="人件費額" placeholder="0"></div>
        <div><label>営業利益(円)</label><input type="number" id="営業利益" placeholder="0"></div>
      </div>
    </details>
    <div class="hint">収支一覧xlsxがある月はPLは自動集計されます（ここは空でOK）。</div>
  </div>

  <p class="status" id="status">読み込み中…</p>
</div>

<div class="actions">
  <button class="btn" onclick="save()">💾 保存</button>
  <button class="btn-ghost" onclick="reload()">↻ 再読込</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ▼デプロイ後、GASの /exec URL をここに貼る（または ?gas=URL で渡す）
var GAS_URL = "https://script.google.com/macros/s/AKfycbzy96yaZ4-GEe2FrTjFvB__Bi_MLzLIsOZ9YEMej7TYvXXlA8RzVe3igxoaCDzaxejwWw/exec";
var FIELDS = ["その他売上","その他売上_内容","食べログ_スコア","食べログ_件数","一休_スコア","一休_件数",
  "Google_スコア","Google_件数","SNS_フォロワー数","原価率","人件費額","営業利益"];

var qs = new URLSearchParams(location.search);
if (qs.get('gas')) GAS_URL = qs.get('gas');
var monthEl = document.getElementById('month');
monthEl.value = (new Date()).toISOString().slice(0,7);

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2600);}
function setStatus(m){document.getElementById('status').textContent=m;}

function gasReady(){ return GAS_URL && GAS_URL.indexOf('script.google.com')>=0; }

function reload(){
  if(!gasReady()){ setStatus('⚠️ GAS未設定。URLを設定してください'); return; }
  setStatus('読み込み中…');
  fetch(GAS_URL + '?month=' + encodeURIComponent(monthEl.value))
    .then(function(r){return r.json();})
    .then(function(d){
      FIELDS.forEach(function(f){ var el=document.getElementById(f); if(el) el.value = (d && d[f]!=null && d[f]!=='') ? d[f] : ''; });
      setStatus('読み込み完了（' + monthEl.value + '）');
    })
    .catch(function(e){ setStatus('読み込みエラー: ' + e.message); });
}

function save(){
  if(!gasReady()){ toast('GAS未設定です'); return; }
  var data={};
  FIELDS.forEach(function(f){ var el=document.getElementById(f); if(el) data[f] = el.type==='number' ? (el.value===''?0:Number(el.value)) : el.value; });
  setStatus('保存中…');
  fetch(GAS_URL, {method:'POST', headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({type:'tenmyu', month: monthEl.value, data: data})})
    .then(function(r){return r.json();})
    .then(function(res){
      if(res.success){ toast('保存しました（'+monthEl.value+'）'); setStatus('保存完了 '+new Date().toLocaleString()); }
      else { toast('保存エラー: '+(res.error||'')); }
    })
    .catch(function(e){
      // no-cors等で応答が読めない場合も送信は成功していることが多い
      toast('送信しました（応答未取得）'); setStatus('送信完了（要確認）');
    });
}

monthEl.addEventListener('change', reload);
reload();
</script>
</body>
</html>
